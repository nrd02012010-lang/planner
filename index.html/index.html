<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planner App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body class="bg-slate-900 text-white min-h-screen p-4">
    <div class="max-w-md mx-auto">
        <header class="text-center py-6">
            <h1 class="text-3xl font-bold text-blue-400">Smart Planner</h1>
            <p class="text-slate-400 text-sm">Твой личный дневник задач</p>
        </header>

        <div class="bg-slate-800 p-6 rounded-3xl shadow-xl border border-slate-700">
            <label class="block text-xs font-semibold text-slate-400 uppercase mb-1 ml-1">Дата и время</label>
            <input type="datetime-local" id="dt" class="w-full bg-slate-700 p-3 rounded-xl mb-4 border-none focus:ring-2 focus:ring-blue-500 outline-none">
            
            <label class="block text-xs font-semibold text-slate-400 uppercase mb-1 ml-1">Что нужно сделать?</label>
            <input type="text" id="task" placeholder="Например: Сдать зачет..." class="w-full bg-slate-700 p-3 rounded-xl mb-6 border-none focus:ring-2 focus:ring-blue-500 outline-none">
            
            <button onclick="add()" class="w-full bg-blue-600 hover:bg-blue-500 py-4 rounded-2xl font-bold transition-all active:scale-95 shadow-lg shadow-blue-900/20">
                Добавить в список
            </button>
        </div>

        <div id="list" class="mt-8 space-y-3">
            <!-- Здесь появятся задачи -->
        </div>
    </div>

    <script>
        function render() {
            const tasks = JSON.parse(localStorage.getItem('tasks') || '[]');
            const list = document.getElementById('list');
            list.innerHTML = tasks.map((t, i) => `
                <div class="bg-slate-800 p-4 rounded-2xl border-l-4 border-blue-500 flex justify-between items-center shadow-md">
                    <div>
                        <div class="text-[10px] text-blue-400 font-bold uppercase">${t.date}</div>
                        <div class="text-slate-200 font-medium">${t.text}</div>
                    </div>
                    <button onclick="del(${i})" class="text-slate-500 hover:text-red-400 p-2">✕</button>
                </div>
            `).join('');
        }

        function add() {
            const dateInput = document.getElementById('dt').value;
            const textInput = document.getElementById('task').value;
            if(!dateInput || !textInput) return alert('Заполни все поля!');
            
            const tasks = JSON.parse(localStorage.getItem('tasks') || '[]');
            tasks.unshift({
                date: dateInput.replace('T', ' | '),
                text: textInput
            });
            localStorage.setItem('tasks', JSON.stringify(tasks));
            document.getElementById('task').value = "";
            render();
        }

        function del(i) {
            const tasks = JSON.parse(localStorage.getItem('tasks') || '[]');
            tasks.splice(i, 1);
            localStorage.setItem('tasks', JSON.stringify(tasks));
            render();
        }

        render();
    </script>
</body>
</html>
