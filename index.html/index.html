<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Daily Planner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #f8fafc; }
        .time-column { width: 60px; border-right: 1px solid #e2e8f0; }
        .hour-row { height: 60px; border-bottom: 1px solid #e2e8f0; position: relative; }
        .modal { transition: transform 0.3s ease-out; transform: translateY(100%); }
        .modal.active { transform: translateY(0); }
        .task-chip { position: absolute; left: 5px; right: 5px; border-radius: 8px; padding: 4px 8px; font-size: 11px; font-weight: 600; color: white; overflow: hidden; }
    </style>
</head>
<body class="text-slate-800">

    <header class="bg-white p-6 shadow-sm sticky top-0 z-10">
        <h1 class="text-2xl font-bold text-slate-900">Моё расписание</h1>
        <p id="currentDate" class="text-blue-500 font-medium text-sm"></p>
    </header>

    <main class="bg-white m-4 rounded-3xl shadow-sm overflow-hidden border border-slate-200">
        <div class="flex">
            <div class="time-column bg-slate-50 flex flex-col">
                <script>
                    for(let i=8; i<=22; i++) {
                        document.write(`<div class="hour-row flex items-center justify-center text-[10px] text-slate-400 font-bold">${i}:00</div>`);
                    }
                </script>
            </div>
            <div class="flex-grow relative" id="grid-content">
                <script>
                    for(let i=8; i<=22; i++) {
                        document.write(`<div class="hour-row"></div>`);
                    }
                </script>
                <div id="tasks-overlay" class="absolute inset-0 pointer-events-none"></div>
            </div>
        </div>
    </main>

    <button onclick="toggleModal(true)" class="fixed bottom-8 right-8 w-16 h-16 bg-blue-600 rounded-full text-white text-4xl shadow-2xl shadow-blue-400 flex items-center justify-center active:scale-90 transition-transform z-20">
        +
    </button>

    <div id="modalOverlay" class="fixed inset-0 bg-black/40 hidden z-30" onclick="toggleModal(false)"></div>
    <div id="modal" class="modal fixed bottom-0 left-0 right-0 bg-white rounded-t-[3rem] p-8 z-40 shadow-[0_-10px_40px_rgba(0,0,0,0.1)]">
        <div class="w-12 h-1.5 bg-slate-200 rounded-full mx-auto mb-6"></div>
        <h2 class="text-xl font-bold mb-6">Новая задача</h2>
        
        <div class="space-y-4">
            <input type="text" id="taskName" placeholder="Что нужно сделать?" class="w-full bg-slate-100 p-4 rounded-2xl border-none outline-none focus:ring-2 focus:ring-blue-500">
            
            <div class="flex gap-4">
                <input type="time" id="taskTime" class="flex-grow bg-slate-100 p-4 rounded-2xl border-none outline-none">
                <select id="taskColor" class="bg-slate-100 p-4 rounded-2xl border-none outline-none">
                    <option value="blue">🔵 Синий</option>
                    <option value="purple">🟣 Фиолет</option>
                    <option value="orange">🟠 Оранж</option>
                </select>
            </div>

            <button onclick="addTask()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold mt-4 shadow-lg active:scale-95 transition-all">
                Добавить в план
            </button>
        </div>
    </div>

    <script>
        // Установка текущей даты
        document.getElementById('currentDate').innerText = new Date().toLocaleDateString('ru-RU', { weekday: 'long', day: 'numeric', month: 'long' });

        function toggleModal(show) {
            const modal = document.getElementById('modal');
            const overlay = document.getElementById('modalOverlay');
            if(show) {
                overlay.classList.remove('hidden');
                setTimeout(() => modal.classList.add('active'), 10);
            } else {
                modal.classList.remove('active');
                setTimeout(() => overlay.classList.add('hidden'), 300);
            }
        }

        function renderTasks() {
            const tasks = JSON.parse(localStorage.getItem('cal_tasks') || '[]');
            const overlay = document.getElementById('tasks-overlay');
            overlay.innerHTML = '';

            tasks.forEach((t, i) => {
                const [hours, minutes] = t.time.split(':');
                const hourNum = parseInt(hours);
                
                if(hourNum >= 8 && hourNum <= 22) {
                    const topPos = (hourNum - 8) * 60 + (parseInt(minutes));
                    const chip = document.createElement('div');
                    chip.className = `task-chip bg-${t.color}-500 shadow-lg border border-white/20`;
                    chip.style.top = topPos + 'px';
                    chip.style.height = '50px'; // Фиксированная высота на 1 час
                    chip.innerHTML = `<div class="pointer-events-auto flex justify-between">
                        <span>${t.time} - ${t.name}</span>
                        <span onclick="event.stopPropagation(); deleteTask(${i})" class="opacity-50">✕</span>
                    </div>`;
                    overlay.appendChild(chip);
                }
            });
        }

        function addTask() {
            const name = document.getElementById('taskName').value;
            const time = document.getElementById('taskTime').value;
            const color = document.getElementById('taskColor').value;

            if(!name || !time) return alert('Введите данные');

            const tasks = JSON.parse(localStorage.getItem('cal_tasks') || '[]');
            tasks.push({ name, time, color });
            localStorage.setItem('cal_tasks', JSON.stringify(tasks));
            
            document.getElementById('taskName').value = '';
            toggleModal(false);
            renderTasks();
        }

        function deleteTask(i) {
            const tasks = JSON.parse(localStorage.getItem('cal_tasks') || '[]');
            tasks.splice(i, 1);
            localStorage.setItem('cal_tasks', JSON.stringify(tasks));
            renderTasks();
        }

        renderTasks();
    </script>

    <div class="hidden bg-blue-500 bg-purple-500 bg-orange-500 border-blue-500 border-purple-500 border-orange-500 text-blue-500 text-purple-500 text-orange-500"></div>
</body>
</html>
